apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: product-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 661296494278.dkr.ecr.ap-south-1.amazonaws.com/product-store-prod-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: ConnectionStrings__DataDBConnection
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: CONNECTION_STRING
        - name: AppSettings__Token
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: TOKEN
