apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: product-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 661296494278.dkr.ecr.ap-south-1.amazonaws.com/product-store-prod-frontend:latest
        ports:
        - containerPort: 80
