name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend Docker image
        run: |
          docker build -t backend ./Backend/Backend
          docker tag backend:latest ${{ secrets.ECR_REPO }}/backend:latest
          docker push ${{ secrets.ECR_REPO }}/backend:latest

      - name: Deploy to EKS
        uses: aws-actions/eks-kubectl@v2
        with:
          cluster-name: product-store-prod
          region: ap-south-1
          kubectl-command: apply -f k8s/
